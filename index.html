<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Infinite 3D Canvas</title>
  <style>
    /* ── @font-face: Chip Display ──────────────────────────── */
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-Regular.woff') format('woff'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-Italic.woff') format('woff'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-Semibold.woff') format('woff'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-SemiboldItalic.woff') format('woff'); font-weight: 600; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-Bold.woff') format('woff'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-BoldItalic.woff') format('woff'); font-weight: 700; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-Black.woff') format('woff'); font-weight: 900; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Display'; src: url('ChipDisp-BlackItalic.woff') format('woff'); font-weight: 900; font-style: italic; font-display: swap; }

    /* ── @font-face: Chip Text ─────────────────────────────── */
    @font-face { font-family: 'Chip Text'; src: url('ChipText-Regular.woff') format('woff'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-Italic.woff') format('woff'); font-weight: 400; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-Medium.woff') format('woff'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-MediumItalic.woff') format('woff'); font-weight: 500; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-Semibold.woff') format('woff'); font-weight: 600; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-SemiboldItalic.woff') format('woff'); font-weight: 600; font-style: italic; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-Bold.woff') format('woff'); font-weight: 700; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Text'; src: url('ChipText-BoldItalic.woff') format('woff'); font-weight: 700; font-style: italic; font-display: swap; }

    /* ── @font-face: Chip Mono ─────────────────────────────── */
    @font-face { font-family: 'Chip Mono'; src: url('ChipMono-Regular.woff') format('woff'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Chip Mono'; src: url('ChipMono-Medium.woff') format('woff'); font-weight: 500; font-style: normal; font-display: swap; }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }

    /* ── Theme tokens ──────────────────────────────────────── */
    body {
      --bg:          #000;
      --nav-bg:      rgba(0, 0, 0, 0.82);
      --nav-text:    rgba(255, 255, 255, 0.75);
      --nav-icon:    #fff;
      --hint:        rgba(255, 255, 255, 0.28);
      --cursor-fill: #fff;
      --cursor-text: #000;
      --accent:      #4AE54A;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Chip Text', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background 0.4s ease;
    }
    body.light {
      --bg:          #f0eeeb;
      --nav-bg:      rgba(240, 238, 235, 0.82);
      --nav-text:    rgba(0, 0, 0, 0.72);
      --nav-icon:    #111;
      --hint:        rgba(0, 0, 0, 0.28);
      --cursor-fill: #111;
      --cursor-text: #fff;
    }

    canvas { display: block; }

    /* ── Film grain overlay ────────────────────────────────── */
    #grain {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.07;
      mix-blend-mode: screen;
      image-rendering: pixelated;
    }
    #hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font: 11px/1 'Chip Text', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--hint);
      pointer-events: none;
      user-select: none;
      transition: color 0.4s ease;
    }

    /* ── Custom cursor ─────────────────────────────────────── */
    #cursor {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 10001;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;

      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      transition:
        width  0.38s cubic-bezier(0.34, 1.42, 0.64, 1),
        height 0.38s cubic-bezier(0.34, 1.42, 0.64, 1),
        border-radius 0.38s cubic-bezier(0.34, 1.42, 0.64, 1),
        background 0.3s ease;

      will-change: transform;
      overflow: hidden;
    }
    #cursor.hover {
      width: 130px;
      height: 40px;
      border-radius: 20px;
    }
    #cursor-label {
      font: 600 11px/1 'Chip Text', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.18s ease 0.14s, transform 0.22s ease 0.12s;
      user-select: none;
    }
    #cursor.hover #cursor-label {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Navigation ────────────────────────────────────────── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10000;
      height: 58px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: transparent;
      pointer-events: auto;
    }
    #nav-logo { display: flex; align-items: center; }
    #nav svg path { fill: var(--nav-icon) !important; transition: fill 0.4s ease; }
    #nav svg circle, #nav svg line { stroke: var(--nav-icon) !important; transition: stroke 0.4s ease; }
    #nav-items {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 64px;
    }
    .nav-link {
      font: 500 13px/1 'Chip Text', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--nav-text);
      letter-spacing: 0.01em;
      white-space: nowrap;
      transition: color 0.4s ease;
      background: none;
      border: none;
      padding: 0;
      cursor: none !important;
    }
    .nav-link.active {
      color: #fff;
    }
    body.light .nav-link.active {
      color: #111;
    }
    #nav-right { display: flex; align-items: center; gap: 20px; }
    #nav-search { display: flex; align-items: center; opacity: 0.75; }

    /* ── Theme switch ───────────────────────────────────────── */
    #theme-switch {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #theme-switch input { display: none; }
    #theme-track {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      position: relative;
      transition: background 0.3s ease;
    }
    body.light #theme-track { background: rgba(0,0,0,0.15); }
    #theme-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--nav-icon);
      transition: transform 0.3s cubic-bezier(0.34, 1.42, 0.64, 1), background 0.4s ease;
    }
    body.light #theme-thumb { transform: translateX(16px); }

    /* ── Full-page menu overlay ─────────────────────────────── */
    #menu-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      flex-direction: column;
      padding: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      overflow: hidden;
    }
    body.light #menu-overlay {
      background: #f0eeeb;
    }
    #menu-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    #menu-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 90px 60px 80px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #menu-scroll::-webkit-scrollbar { display: none; }

    #menu-section-label {
      font: 600 11px/1 'Chip Text', -apple-system, BlinkMacSystemFont, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 32px;
    }

    #menu-items {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #menu-items li {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    #menu-overlay.open #menu-items li {
      opacity: 1;
      transform: translateY(0);
    }

    .menu-item {
      display: inline-block;
      font-family: 'Chip Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 500;
      font-size: clamp(36px, 6vw, 72px);
      line-height: 1.2;
      color: #fff;
      padding: 4px 0;
      transition: transform 0.35s cubic-bezier(0.34, 1.42, 0.64, 1), opacity 0.25s ease;
      background: none;
      border: none;
      cursor: none !important;
      text-align: left;
    }
    body.light .menu-item {
      color: #111;
    }
    .menu-item:hover {
      transform: translateX(40px);
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="nav">
    <a id="nav-logo" href="#" onclick="closeMenu(); return false;">
      <svg width="28" height="30" viewBox="0 0 34 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.00101 8.58244V17.1649C4.20046 17.1649 0.25 13.2903 0.25 8.58244C0.25 3.8746 4.20046 0 9.00101 0C13.8016 0 17.752 3.8746 17.752 8.58244H9.00101Z" fill="white"/>
        <path d="M25.0049 26.9106V35.493C20.2044 35.493 16.2539 31.6184 16.2539 26.9106C16.2539 22.2027 20.2044 18.3281 25.0049 18.3281C29.8055 18.3281 33.7559 22.2027 33.7559 26.9106H25.0049Z" fill="white"/>
        <path d="M24.9971 16.9188L33.9982 0.253906H15.9961L24.9971 16.9188Z" fill="white"/>
        <path d="M9.00104 35.2431L18.0021 18.5781H0L9.00104 35.2431Z" fill="white"/>
      </svg>
    </a>
    <div id="nav-items">
      <button class="nav-link" data-section="design">Design at DevRev</button>
      <button class="nav-link" data-section="foundations">Foundations</button>
      <button class="nav-link" data-section="system">Design System</button>
    </div>
    <div id="nav-right">
      <label id="theme-switch" title="Toggle theme">
        <input type="checkbox" id="theme-toggle">
        <div id="theme-track"><div id="theme-thumb"></div></div>
      </label>
      <div id="nav-search">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="7.5" cy="7.5" r="5" stroke="white" stroke-width="1.5"/>
          <line x1="11.5" y1="11.5" x2="16" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
  </nav>

  <!-- Full-page menu overlay -->
  <div id="menu-overlay">
    <div id="menu-scroll">
      <div id="menu-section-label"></div>
      <ul id="menu-items"></ul>
    </div>
  </div>

  <canvas id="grain"></canvas>
  <div id="hint">Move mouse to steer · Scroll to accelerate</div>
  <div id="cursor"><span id="cursor-label">View →</span></div>

  <script>
    const menuData = {
      design: {
        label: 'Design at DevRev',
        items: ['Introduction', 'Brand Essence', 'Essential Futurism']
      },
      foundations: {
        label: 'Foundations',
        items: [
          'Logo', 'Typography', 'Color', 'Photography',
          'Illustration', 'Iconography', 'Data Visualization',
          'Patterns', 'Grid', 'Motion', 'Events', 'Swag', 'Examples'
        ]
      },
      system: {
        label: 'Design System',
        items: ['Tokens', 'Components', 'Patterns']
      }
    };

    const overlay = document.getElementById('menu-overlay');
    const menuScroll = document.getElementById('menu-scroll');
    const sectionLabel = document.getElementById('menu-section-label');
    const menuList = document.getElementById('menu-items');
    let activeSection = null;

    function openMenu(section) {
      const data = menuData[section];
      if (!data) return;

      if (activeSection === section && overlay.classList.contains('open')) {
        closeMenu();
        return;
      }

      activeSection = section;
      sectionLabel.textContent = data.label;
      menuList.innerHTML = '';

      data.items.forEach((item, i) => {
        const li = document.createElement('li');
        li.style.transitionDelay = (i * 0.04) + 's';
        const btn = document.createElement('button');
        btn.className = 'menu-item';
        btn.textContent = item;
        li.appendChild(btn);
        menuList.appendChild(li);
      });

      document.querySelectorAll('.nav-link').forEach(el => {
        el.classList.toggle('active', el.dataset.section === section);
      });

      menuScroll.scrollTop = 0;
      overlay.classList.add('open');
    }

    function closeMenu() {
      overlay.classList.remove('open');
      activeSection = null;
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    }

    document.querySelectorAll('.nav-link').forEach(btn => {
      btn.addEventListener('click', () => openMenu(btn.dataset.section));
    });

    let menuMouseY = 0;
    let autoScrollRAF = null;
    const EDGE_ZONE = 120;
    const MAX_SCROLL_SPEED = 12;

    window.addEventListener('mousemove', e => { menuMouseY = e.clientY; });

    function menuAutoScroll() {
      autoScrollRAF = requestAnimationFrame(menuAutoScroll);
      if (!overlay.classList.contains('open')) return;

      const vh = window.innerHeight;
      const topEdge = EDGE_ZONE;
      const bottomEdge = vh - EDGE_ZONE;

      if (menuMouseY < topEdge) {
        const strength = 1 - (menuMouseY / topEdge);
        menuScroll.scrollTop -= MAX_SCROLL_SPEED * strength;
      } else if (menuMouseY > bottomEdge) {
        const strength = (menuMouseY - bottomEdge) / EDGE_ZONE;
        menuScroll.scrollTop += MAX_SCROLL_SPEED * strength;
      }
    }
    menuAutoScroll();
  </script>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ─── Renderer ────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    const BG_DARK  = new THREE.Color(0x000000);
    const BG_LIGHT = new THREE.Color(0xf0eeeb);
    renderer.setClearColor(BG_DARK);
    document.body.appendChild(renderer.domElement);

    // ─── Scene & Camera ──────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = BG_DARK.clone();

    // ─── Theme toggle ────────────────────────────────────────────────────
    document.getElementById('theme-toggle').addEventListener('change', e => {
      const light = e.target.checked;
      document.body.classList.toggle('light', light);
      const bg = light ? BG_LIGHT : BG_DARK;
      scene.background.copy(bg);
      renderer.setClearColor(bg);
    });

    const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 300);
    camera.position.set(0, -1, 14);
    camera.lookAt(0, 0, 0);

    // ─── Textures ────────────────────────────────────────────────────────
    const loader = new THREE.TextureLoader();
    const NAMES = [
      'thumbnail-brandUI.png',
      'thumbnail-color.png',
      'thumbnail-colour.png',
      'thumbnail-elevation.png',
      'thumbnail-icons.png',
      'thumbnail-illustration.png',
      'thumbnail-material.png',
      'thumbnail-pattern-1.png',
      'thumbnail-pattern-2.png',
      'thumbnail-pattern.png',
      'thumbnail-photography.png',
      'thumbnail-spacing-1.png',
      'thumbnail-spacing.png',
      'thumbnail-tokens.png',
      'thumbnail-typography.png',
    ];

    const textures = NAMES.map(n => {
      const t = loader.load(n);
      t.colorSpace = THREE.SRGBColorSpace;
      return t;
    });

    // Labels parallel to textures array
    const labels = NAMES.map(n =>
      n.replace(/^thumbnail-/, '').replace(/\.png$/, '').replace(/-/g, ' ')
    );

    // ─── Video texture ────────────────────────────────────────────────────
    const videoEl = document.createElement('video');
    videoEl.src = 'vid-demo-720.mov';
    videoEl.loop = true;
    videoEl.muted = true;
    videoEl.autoplay = true;
    videoEl.playsInline = true;
    videoEl.play().catch(() => {});
    const videoTex = new THREE.VideoTexture(videoEl);
    videoTex.colorSpace = THREE.SRGBColorSpace;
    textures.push(videoTex);
    labels.push('demo');

    function makeVideo(src, label) {
      const el = document.createElement('video');
      el.src = src; el.loop = true; el.muted = true;
      el.autoplay = true; el.playsInline = true;
      el.play().catch(() => {});
      const tex = new THREE.VideoTexture(el);
      tex.colorSpace = THREE.SRGBColorSpace;
      textures.push(tex);
      labels.push(label);
      return { el, texIndex: textures.length - 1 };
    }

    const vid2 = makeVideo('vid-demo-720-2.mov', 'demo 2');
    const vid3 = makeVideo('vid-demo-720-3.mov', 'demo 3');
    const videoTexIndices = [textures.length - 3, vid2.texIndex, vid3.texIndex];
    const videoEls = [videoEl, vid2.el, vid3.el];

    // ─── Grid Config ─────────────────────────────────────────────────────
    const COLS = 8, ROWS = 5;
    const TW = 3.6, TH = 3.6;
    const GAP = 0.9;
    const SX = TW + GAP, SY = TH + GAP;
    const TOTAL_W = COLS * SX;
    const TOTAL_H = ROWS * SY;

    // Z flythrough: 10 layers spread over 30 units — cards cycle through on Z axis
    const Z_LAYERS = 10;
    const Z_STEP   = 3.0;
    const TOTAL_Z  = Z_LAYERS * Z_STEP; // 30

    // ─── Deterministic texture assignment ────────────────────────────────
    function buildAssignments(count, numTex) {
      const result = [];
      while (result.length < count) {
        const chunk = Array.from({ length: numTex }, (_, i) => i);
        for (let i = chunk.length - 1; i > 0; i--) {
          const j = (i * 7 + 3) % (i + 1);
          [chunk[i], chunk[j]] = [chunk[j], chunk[i]];
        }
        result.push(...chunk);
      }
      return result.slice(0, count);
    }
    const assignments = buildAssignments(COLS * ROWS, textures.length);

    // ─── Build Cards ─────────────────────────────────────────────────────
    const cards = [];
    const videoCards = [];   // meshes using the video texture — geometry updated on metadata load
    const geo = new THREE.PlaneGeometry(TW, TH);
    const raycaster = new THREE.Raycaster();

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const nameIdx = assignments[r * COLS + c];
        const tex = textures[nameIdx];
        const label = labels[nameIdx];

        // Start fully transparent — will fade in as they enter view
        const mat = new THREE.MeshBasicMaterial({
          map: tex,
          transparent: true,
          depthWrite: false,
          opacity: 0,
        });

        const mesh = new THREE.Mesh(geo, mat);

        // Z: 10 distinct layers spread across 30 units
        const bz = ((c * 3 + r * 7) % Z_LAYERS) * Z_STEP - (TOTAL_Z - Z_STEP) / 2;
        // X/Y: grid + slight positional jitter to break rigidity
        const bx = c * SX - (COLS - 1) * SX / 2 + Math.sin(c * 1.3 + r * 2.7 + bz * 0.4) * 0.5;
        const by = r * SY - (ROWS - 1) * SY / 2 + Math.cos(c * 2.1 - r * 1.5 + bz * 0.3) * 0.4;

        const rotX = (Math.sin(c * 1.7 + r * 2.3) * 0.5 - 0.25) * 0.05;
        const rotY = (Math.sin(c * 2.1 - r * 1.5) * 0.5 - 0.25) * 0.09;

        mesh.position.set(bx, by, bz);
        mesh.rotation.x = rotX;
        mesh.rotation.y = rotY;
        mesh.userData = {
          bx, by, bz, rotX, rotY, label,
          opacity: 0,       // current animated opacity
          zLift: 0,         // hover Z lift (animated)
          hoverScale: 1.0,  // hover scale (animated)
          tiltX: 0, tiltY: 0,           // current animated card tilt
          tiltTargetX: 0, tiltTargetY: 0, // tilt target from cursor UV position
        };

        scene.add(mesh);
        cards.push(mesh);
        if (videoTexIndices.includes(nameIdx)) videoCards.push({ mesh, nameIdx });
      }
    }

    // Swap each video card's geometry to match its true aspect ratio
    videoEls.forEach((el, i) => {
      el.addEventListener('loadedmetadata', () => {
        const aspect = el.videoWidth / el.videoHeight;
        const vGeo = new THREE.PlaneGeometry(TH * aspect, TH);
        const idx = videoTexIndices[i];
        videoCards.filter(v => v.nameIdx === idx).forEach(v => { v.mesh.geometry = vGeo; });
      });
    });

    // ─── Interaction State ───────────────────────────────────────────────
    let panX = 0, panZ = 0;
    let velX = 0, velZ = 0;   // drag / scroll impulse on top of auto-fly
    let tiltAngle = 0;        // camera roll — driven by mouse X
    const BASE_SPEED = 0.028; // constant forward fly speed
    let isDragging = false, lx = 0, ly = 0;
    const mouse = new THREE.Vector2(0, 0);
    const smoothMouse = new THREE.Vector2(0, 0);
    const camTarget = new THREE.Vector3(0, -1, 14);
    let hoveredCard = null;

    const el = renderer.domElement;
    const cursorEl = document.getElementById('cursor');

    el.addEventListener('mousedown', e => {
      isDragging = true;
      lx = e.clientX; ly = e.clientY;
    });

    const menuOverlay = document.getElementById('menu-overlay');

    window.addEventListener('mousemove', e => {
      cursorEl.style.left = e.clientX + 'px';
      cursorEl.style.top  = e.clientY + 'px';

      const target = e.target;
      const isOverInteractive = target.closest('.menu-item') || target.closest('.nav-link') || target.closest('#nav-logo') || target.closest('#nav-search');

      if (isOverInteractive) {
        cursorEl.classList.remove('hover');
        hoveredCard = null;
        return;
      }

      mouse.set(
        (e.clientX / innerWidth - 0.5) * 2,
        -(e.clientY / innerHeight - 0.5) * 2,
      );

      if (menuOverlay.classList.contains('open')) {
        cursorEl.classList.remove('hover');
        hoveredCard = null;
        return;
      }

      if (isDragging) {
        velX =  (e.clientX - lx) * 0.022;
        velZ = -(e.clientY - ly) * 0.022;
        panX += velX;
        panZ += velZ;
        lx = e.clientX; ly = e.clientY;
        return;
      }

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(cards);
      const prev = hoveredCard;
      hoveredCard = hits.length > 0 ? hits[0].object : null;
      if (hoveredCard !== prev) {
        cursorEl.classList.toggle('hover', !!hoveredCard);
        if (hoveredCard) document.getElementById('cursor-label').textContent = hoveredCard.userData.label;
      }
      if (hoveredCard && hits[0]?.uv) {
        const uv = hits[0].uv;
        hoveredCard.userData.tiltTargetY = (uv.x - 0.5) *  0.28;
        hoveredCard.userData.tiltTargetX = (uv.y - 0.5) * -0.20;
      }
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // Scroll = speed boost
    el.addEventListener('wheel', e => {
      e.preventDefault();
      velZ += e.deltaY * 0.012;
    }, { passive: false });

    // Touch: drag to pan/fly
    let lt = { x: 0, y: 0 };
    el.addEventListener('touchstart', e => { lt = { x: e.touches[0].clientX, y: e.touches[0].clientY }; velX = velZ = 0; });
    el.addEventListener('touchmove', e => {
      e.preventDefault();
      velX =  (e.touches[0].clientX - lt.x) * 0.022;
      velZ = -(e.touches[0].clientY - lt.y) * 0.022;
      panX += velX; panZ += velZ;
      lt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: false });

    // ─── Film Grain ──────────────────────────────────────────────────────
    const grainCanvas = document.getElementById('grain');
    const grainCtx = grainCanvas.getContext('2d');
    const GRAIN_W = 256, GRAIN_H = 256;
    grainCanvas.width = GRAIN_W;
    grainCanvas.height = GRAIN_H;
    const grainData = grainCtx.createImageData(GRAIN_W, GRAIN_H);
    let grainTick = 0;
    function updateGrain() {
      grainTick++;
      if (grainTick % 2 !== 0) return;
      const d = grainData.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 | 0;
        d[i] = d[i + 1] = d[i + 2] = v;
        d[i + 3] = 255;
      }
      grainCtx.putImageData(grainData, 0, 0);
    }

    // ─── Helpers ─────────────────────────────────────────────────────────
    function wrap(v, size) {
      return ((v % size) + size * 1.5) % size - size / 2;
    }

    // ─── Animate ─────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    const _projected = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Auto-fly forward always; drag / scroll adds impulse on top
      if (!isDragging) {
        panX += velX;
        panZ += velZ;
        velX *= 0.905;
        velZ *= 0.905;
      }
      panZ += BASE_SPEED;

      // Smooth mouse — dreamy lag for gentle steering
      smoothMouse.x += (mouse.x - smoothMouse.x) * 0.018;
      smoothMouse.y += (mouse.y - smoothMouse.y) * 0.018;

      // Mouse X steers left/right continuously (when not dragging)
      if (!isDragging) panX += smoothMouse.x * 0.022;

      // Camera drifts slightly toward mouse (look-around feel)
      camTarget.x += (smoothMouse.x * 1.4 - camTarget.x) * 0.005;
      camTarget.y += (-1 + smoothMouse.y * 0.8 - camTarget.y) * 0.005;
      camera.position.x = camTarget.x;
      camera.position.y = camTarget.y;

      // Tilt: camera rolls with mouse X, springs back
      tiltAngle += (-smoothMouse.x * 0.13 - tiltAngle) * 0.06;
      camera.up.set(Math.sin(tiltAngle), Math.cos(tiltAngle), 0);
      camera.lookAt(0, 0, 0);

      // Film grain update
      updateGrain();

      const CAM_Z = camera.position.z; // fixed Z

      cards.forEach(card => {
        const d = card.userData;
        const { bx, by, bz, rotX, rotY } = d;

        // ── Wrapping on all axes ───────────────────────────────────────
        const baseWx = wrap(bx + panX, TOTAL_W);
        const baseWy = wrap(by,        TOTAL_H);  // no Y panning — keep rows stable
        const baseWz = wrap(bz + panZ, TOTAL_Z);

        // Flat mouse parallax (same shift for all depths — subtle steering feel)
        const wx = baseWx + smoothMouse.x * 0.6;
        const wy = baseWy + smoothMouse.y * 0.4;

        // Organic float — small, so it doesn't fight the Z movement
        const floatZ = Math.sin(t * 0.15 + bx * 0.35 + by * 0.25) * 0.12;

        // Reset opacity when any axis wraps (card teleported)
        const jumpX = d.prevBaseWx !== undefined && Math.abs(baseWx - d.prevBaseWx) > TOTAL_W * 0.4;
        const jumpZ = d.prevBaseWz !== undefined && Math.abs(baseWz - d.prevBaseWz) > TOTAL_Z * 0.4;
        if (jumpX || jumpZ) d.opacity = 0;
        d.prevBaseWx = baseWx;
        d.prevBaseWy = baseWy;
        d.prevBaseWz = baseWz;

        card.position.x = wx;
        card.position.y = wy;
        card.position.z = baseWz + floatZ;

        // ── Hover ──────────────────────────────────────────────────────
        const isHovered = card === hoveredCard;
        const targetScale = isHovered ? 1.14 : 1.0;
        d.hoverScale += (targetScale - d.hoverScale) * 0.09;
        card.scale.x = d.hoverScale;
        card.scale.y = d.hoverScale;

        const tiltToX = isHovered ? d.tiltTargetX : 0;
        const tiltToY = isHovered ? d.tiltTargetY : 0;
        d.tiltX += (tiltToX - d.tiltX) * 0.1;
        d.tiltY += (tiltToY - d.tiltY) * 0.1;

        const breathAmt = isHovered ? 0 : 1;
        card.rotation.x = rotX + Math.sin(t * 0.22 + bx * 0.4) * 0.008 * breathAmt + d.tiltX;
        card.rotation.y = rotY + Math.sin(t * 0.17 + by * 0.35) * 0.012 * breathAmt + d.tiltY;

        // ── Z-depth fade: appears from distance, fades as it rushes past ──
        const zDist = CAM_Z - card.position.z;  // positive = in front of camera
        const zFade = zDist > 0
          ? Math.min(1, zDist / 1.2) * Math.min(1, (TOTAL_Z - zDist) / 5)
          : 0;

        // Also check X/Y viewport via NDC projection
        _projected.set(wx, wy, card.position.z);
        _projected.project(camera);
        const inView = Math.abs(_projected.x) < 1.35 && Math.abs(_projected.y) < 1.35;

        const targetOpacity = (inView && zFade > 0.02) ? zFade : 0;
        const lerpRate = targetOpacity > d.opacity ? 0.04 : 0.15;
        d.opacity += (targetOpacity - d.opacity) * lerpRate;
        card.material.opacity = d.opacity;
      });

      renderer.render(scene, camera);
    }

    animate();

    // ─── Resize ──────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
